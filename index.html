<script>
const username = "aeonscry"; // change this

async function fetchAllRepos(user) {
  let page = 1;
  let all = [];
  while (true) {
    const url = `https://api.github.com/users/${user}/repos?per_page=100&page=${page}&sort=updated`;
    const res = await fetch(url);
    const data = await res.json();
    all = all.concat(data);
    if (data.length < 100) break;
    page++;
  }
  return all;
}

function renderRepos(repos) {
  const container = document.getElementById("repos");
  container.innerHTML = "";

  const filtered = repos.filter(r => !r.fork && !r.archived);

  for (const r of filtered) {
    const pagesUrl = `https://${username}.github.io/${r.name}`;

    const div = document.createElement("div");
    div.innerHTML = `
      <h3>${r.name}</h3>
      <p>${r.description || ""}</p>
      <a href="${r.html_url}" target="_blank">📦 GitHub Repo</a>
      |
      <a href="${pagesUrl}" target="_blank">🌐 Live Page</a>
      <hr/>
    `;

    container.appendChild(div);
  }
}

(async () => {
  const repos = await fetchAllRepos(username);
  renderRepos(repos);
})();
</script>
